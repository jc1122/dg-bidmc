version: 3
campaign_id: dg-gat-respiratory-v2
goal: >
  Find the best DG-based graph neural network for detecting inhale/exhale trough
  boundaries in ICU impedance pneumography (BIDMC, 125 Hz). Jointly optimize over
  graph construction variants, motifs feature sets, network topology, and training
  hyperparameters. Selection metric: validation boundary F1 @±600ms. Final reporting
  must use held-out test metrics. Stretch target: validation boundary F1 @±600ms ≥ 0.99.
  Secondary reporting: respiratory-rate MAE/RMSE/bias/LoA.

# ──────────────────────────────────────────────────────────────────────────────
# Benchmark reference points (reviewed 2026-04-10):
#
# Task: per-breath boundary detection on BIDMC impedance pneumography
# No published external per-breath trough-boundary benchmark was found for this
# exact event-matching protocol on BIDMC IP. Exact-task comparison is therefore
# against same-dataset baselines only:
#   - DG-v5 zero-shot:      boundary F1 @600ms = 0.322
#   - WaveletDenoise:       boundary F1 @600ms = 0.291
#   - BinSeg:               boundary F1 @600ms = 0.192
#
# For respiratory-rate reporting, literature values are contextual rather than
# exact-task-comparable:
#   - Charlton 2021 IP SQI: MAE 0.21–0.40 bpm, but only on the 34.9% of segments
#     passing the high-quality gate; also reports sensitivity 77.7%, specificity 82.3%
#   - Karlen 2013 CapnoBase benchmark: MAE ≈ 1.0 bpm, bias ≈ -0.01 bpm,
#     LoA half-width ≈ 2.6 bpm (different sensors / population)
# Final claims against literature must use held-out test metrics, not validation.
# ──────────────────────────────────────────────────────────────────────────────

objective:
  metric: boundary_f1_600ms
  direction: maximize
  aggregation:
    method: weighted_mean
    weights:
      bidmc_val: 0.55
      bidmc_val_adversarial: 0.45    # weight adversarial heavily — DG's main differentiator
  improvement_threshold: 0.003
  reporting_metrics:
    - patient_macro_f1_600ms
    - boundary_f1_300ms
    - event_precision_600ms
    - event_recall_600ms
    - boundary_mae_ms_600ms
    - rate_mae_bpm
    - rate_rmse_bpm
    - rate_bias_bpm
    - rate_loa_low_bpm
    - rate_loa_high_bpm
    - rate_pearson_r

# ──────────────────────────────────────────────────────────────────────────────
# Datasets
# Split: 35 train / 8 val / 10 test (stratified by adversarial profile)
# Val adversarial = val patients with drift_severity > 0.10 OR
#                   irregularity_cv > 0.15 OR sigh_rate > 0.10
#
# fingerprint: sha256 computed over sorted file list after Phase 1 data prep:
#   find data/graphs/{val,val_adversarial}/ -name "*.pt" -print0 |
#   sort -z | xargs -0 sha256sum | sha256sum
#
# PLACEHOLDER fingerprints must be replaced after data_loader.py runs.
# ──────────────────────────────────────────────────────────────────────────────
datasets:
  - id: bidmc_val
    local_path: data/graphs/val/
    role: train_eval
    fingerprint: sha256:62daeb43966c70e9caf78a7ba34acb57511bb2879ee9da3fb8eec207ceb13e86

  - id: bidmc_val_adversarial
    local_path: data/graphs/val_adversarial/
    role: eval_only
    fingerprint: sha256:70354336267de5cfd14bb5e4e94488aef58b40159cf6cf3dca6cd3f59ece5309

# ──────────────────────────────────────────────────────────────────────────────
# Baseline
# Current best measured on 5-patient zero-shot eval (results/real_data_respiratory.json):
#   DG-v5: F1 = 0.322 (aggregate of clean, drift, sigh, irregular patients)
# TODO Phase 1: replace with val-set F1 from first trained DG-GAT run.
# ──────────────────────────────────────────────────────────────────────────────
baseline:
  aggregate: 0.322
  by_dataset:
    bidmc_val: 0.322
    bidmc_val_adversarial: 0.275    # estimated (irregular/burst patients in zero-shot eval)
  # TODO after first training run: update with actual val F1

# ──────────────────────────────────────────────────────────────────────────────
# Stop conditions
# target_metric = 0.99 — push beyond SOTA and verify approach ceiling.
# Per-graph optimal PP ceiling measured at 0.9888 (error_analysis.json).
# Reaching 0.99 requires model-level improvements, not just post-processing.
# max_iterations = 60 — generous for full joint search (arch + features + hyperparams)
# max_no_improve = 8 — allow TPE to explore before concluding (large search space)
# ──────────────────────────────────────────────────────────────────────────────
stop_conditions:
  max_iterations: 60
  max_no_improve_iterations: 8
  target_metric: 0.99
  max_wallclock_hours: 168           # 1 week

proposal_policy:
  current_target: 6
  current_floor: 3
  next_cap: 150
  distinctness_rule: non_overlapping

dispatch_policy:
  background_slots: 4
  auxiliary_slots: 2

# ──────────────────────────────────────────────────────────────────────────────
# Sanity check
# scripts/local_sanity.py --fast:
#   1. Load bidmc01 via wfdb
#   2. LP-filter, build DG graph (2 variants: standard + trough-emphasis)
#   3. Extract full feature set (all motifs metrics enabled)
#   4. Construct PyG Data object
#   5. Forward pass through all supported arch types (GAT, GCN, SAGE, GIN)
#   6. Call boundary_f1() with dummy predictions
#   7. Print sizes and pass/fail — must complete in < 60s
# ──────────────────────────────────────────────────────────────────────────────
sanity:
  command: python3 /root/dg_bidmc/scripts/local_sanity.py --fast
  max_duration_seconds: 60
  require_zero_temporal_leakage: true
  require_config_load: true

artifacts:
  code_roots:
    - .
  data_roots:
    - data/graphs
  exclude:
    - .git
    - .venv
    - .ml-metaopt
    - __pycache__
    - "*.pyc"
    - data/raw            # raw BIDMC wfdb files — re-downloaded on demand by wfdb

remote_queue:
  backend: ray-hetzner
  retry_policy:
    max_attempts: 2
  enqueue_command: >-
    python3 /opt/ray-hetzner/metaopt/enqueue_batch.py
    --queue-root /root/dg_bidmc/.ml-metaopt
    --manifest
  status_command: >-
    python3 /opt/ray-hetzner/metaopt/get_batch_status.py
    --queue-root /root/dg_bidmc/.ml-metaopt
    --batch-id
  results_command: >-
    python3 /opt/ray-hetzner/metaopt/fetch_batch_results.py
    --queue-root /root/dg_bidmc/.ml-metaopt
    --batch-id

# ──────────────────────────────────────────────────────────────────────────────
# Execution
#
# runner: scripts/ray_runner.py
#   - Reads METAOPT_TRIAL_CONFIG (JSON string in env) for hyperparameters
#   - Trains one model configuration for max_epochs
#   - Evaluates boundary F1 @600ms on val and val_adversarial splits
#   - Also computes rate_mae_bpm (logged as secondary metric)
#   - Writes JSON result to METAOPT_RESULT_PATH:
#       {"boundary_f1_600ms": float, "rate_mae_bpm": float, "by_dataset": {...}}
#   - CRITICAL: all GATConv/TransformerConv layers MUST use add_self_loops=False
#     (gfx1010 torch.nonzero GPU kernel missing — see AGENTS.md pitfall 8)
#
# ──────────────────────────────────────────────────────────────────────────────
# SEARCH SPACE (all fields passed in METAOPT_TRIAL_CONFIG JSON)
#
# ── Graph construction (highs/lows series to degreegraph.compute_arrays) ──
#   graph_variant:
#     "standard"         compute_arrays(sig_lp, sig_lp)          — symmetric
#     "trough_emphasis"  compute_arrays(sig_1hz, sig_lp)         — smoothed highs → troughs dominate
#     "peak_emphasis"    compute_arrays(sig_lp, sig_1hz)         — smoothed lows → peaks dominate
#     "dual_res"         two graphs (1Hz + 2Hz) merged by bar proximity
#
#   lp_cutoff_hz:        [1.0, 1.5, 2.0, 2.5, 3.0]              — LP filter before DG
#   n_levels:            [2, 3, 4]                                — KMeans clusters for level feature
#   d_min_factor:        [0.40, 0.50, 0.55, 0.65, 0.70]         — D_MIN = factor × mean_half_period
#   detrend:             ["none", "linear", "window_linear"]      — pre-DG detrending
#   burst_suppress:      [true, false]                            — MAD clipping pre-DG
#   wavelet_denoise:     [true, false]                            — VisuShrink wavelet pre-DG
#
# ── Node features (binary flags — which motifs metrics to include) ──
#   Basic (always on):
#     feat_bar_position          bar_position_norm ∈ [0,1]
#     feat_log_edge_size         log(edge_size) normalized
#     feat_is_low                node_is_low (1=trough, 0=peak)
#
#   Structural (from motifs EdgeGraph per-node):
#     feat_amplitude:            [true, false]   signal amplitude z-scored
#     feat_duration:             [true, false]   samples-to-next-node normalized
#     feat_level:                [true, false]   KMeans level / (n_levels-1)
#     feat_node_degree:          [true, false]   count of edges touching node
#     feat_commitment_ratio:     [true, false]   structural_commitment_ratio (None→1.0)
#     feat_run_asymmetry:        [true, false]   structural_run_asymmetry (None→0.0)
#     feat_span_overlap:         [true, false]   structural_span_mean_overlap (None→0.0)
#     feat_swing_velocity:       [true, false]   mean_swing_velocity (local window)
#     feat_birth_rate:           [true, false]   c_birth_rate_mean (local window)
#     feat_edge_size_ratio:      [true, false]   log_edge_size / window_mean (local context)
#     feat_amplitude_delta:      [true, false]   amplitude difference from previous node
#     feat_duration_ratio:       [true, false]   duration / window_median_duration
#     feat_phase_estimate:       [true, false]   sin/cos of estimated phase in breath cycle
#
#   Note: in_dim is computed dynamically from enabled features (3 base + N optional)
#
# ── Edge features ──
#   edge_feat_log_size:          [true, false]   log(edge_size) normalized (always recommended)
#   edge_feat_direction_match:   [true, false]   src.is_low == dst.is_low
#   edge_feat_direction:         [true, false]   absolute edge_direction (bool → float)
#   edge_feat_duration_norm:     [true, false]   edge_duration / mean_duration
#   edge_feat_amplitude_delta:   [true, false]   |amp[dst] - amp[src]| normalized
#
#   Note: edge_dim is computed dynamically from enabled edge features
#
# ── Network topology ──
#   arch:
#     "gat"              GATConv — attention, add_self_loops=False always
#     "gat_v2"           GATv2Conv — dynamic attention (more expressive)
#     "gcn"              GCNConv — spectral normalization
#     "sage"             SAGEConv — neighborhood aggregation, inductive
#     "gin"              GINConv — Weisfeiler-Lehman expressive
#     "pna"              PNAConv — multiple aggregators (mean/max/min/std)
#     "transformer"      TransformerConv — full multi-head attention, add_self_loops=False
#     "mlp_only"         No message passing — pure node feature MLP (ablation)
#     "edge_conv"        EdgeConv — edge feature aggregation (DynamicEdgeConv style)
#
#   n_layers:            [1, 2, 3, 4, 5]
#   hidden_dim:          [32, 64, 128, 256]
#   n_heads:             [2, 4, 8, 16]        — GAT/GATv2/Transformer only
#   dropout:             [0.0, 0.05, 0.10, 0.20, 0.30]
#   residual:            [true, false]         — skip connections between layers
#   batch_norm:          [true, false]         — BN after each conv
#   concat_heads:        [true, false]         — concat vs mean for multi-head (GAT)
#   aggr:                ["mean", "max", "sum"] — aggregation for SAGE/GIN
#
# ── Output head ──
#   boundary_head_layers:    [1, 2]            — MLP depth for boundary classification
#   use_rate_head:           [true, false]      — whether to include rate regression aux task
#   use_type_head:           [true, false]      — whether to include breath-type aux task
#
# ── Training ──
#   lr:                  log-uniform [5e-5, 5e-2]
#   weight_decay:        log-uniform [1e-6, 1e-2]
#   pos_weight:          uniform [2.0, 20.0]         — BCEWithLogitsLoss positive class weight
#   loss_rate_weight:    [0.0, 0.05, 0.10, 0.20]    — aux rate regression loss weight
#   loss_type_weight:    [0.0, 0.10, 0.20]           — aux type classification loss weight
#   optimizer:           ["adamw", "adam", "sgd_momentum"]
#   scheduler:           ["cosine", "cosine_warmup", "plateau", "none"]
#   warmup_epochs:       [0, 5, 10]                  — warmup for cosine_warmup
#   max_epochs:          [50, 100, 150, 200]
#   patience:            [10, 15, 20]                — early stopping patience (val F1)
#   window_breaths:      [3, 4, 6, 8]               — breath-window size for graph extraction
#   tol_samples_train:   [50, 75, 100]              — label assignment tolerance at training
#   batch_size:          [16, 32, 64]
#   augment:             ["none", "drift", "burst", "both", "heavy"]
#   augment_prob:        [0.3, 0.5, 0.7]            — probability of applying augmentation
#
# ── Total search dimensionality: ~35–40 dimensions ──
# Optuna TPE handles this well; expect ~30–50 trials to identify strong regions.
# ──────────────────────────────────────────────────────────────────────────────
execution:
  runner_type: ray_queue_runner
  entrypoint: python3 /srv/metaopt/project/scripts/ray_runner.py
  target_cluster_utilization: 0.90
  trial_budget:
    kind: fixed_trials
    value: 1               # 1 Ray job per campaign iteration; Optuna TPE in orchestrator
  search_strategy:
    kind: optuna_tpe
    seed: 42
